<!DOCTYPE html>
<html lang="it">
<head>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Prodotti</title>
<style>
    /* Body bianco stile Apple */
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f5f5f7; /* tipico sfondo chiaro Apple */
    }

    /* Navbar centrata e colori Apple */
    .navbar {
        justify-content: center; /* centra i link della navbar */
        background-color: #ffffff; /* bianco Apple */
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .navbar .nav-link {
        color: #1d1d1f; /* testo scuro Apple */
        font-weight: 500;
    }
    .navbar .nav-link:hover {
        color: #0071e3; /* blu Apple */
    }
    .navbar-brand {
        color: #1d1d1f;
        font-weight: bold;
    }
    .navbar-brand:hover {
        color: #0071e3;
    }

    /* Contenitore glassmorphism Apple */
    .glass-container {
        background: rgba(255, 255, 255, 0.8);
        border-radius: 20px;
        padding: 50px 80px;
        text-align: center;
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
        width: fit-content;
        margin: 50px auto; /* centrato orizzontalmente con margine verticale */
    }

    h1 {
        color: #1d1d1f; /* testo scuro Apple */
        margin-bottom: 40px;
        font-weight: 600;
    }

    /* Bottoni Apple */
    .btn {
        display: inline-block;
        margin: 15px;
        padding: 15px 30px;
        font-size: 18px;
        font-weight: bold;
        color: #ffffff;
        text-decoration: none;
        border-radius: 12px;
        transition: all 0.3s ease;
        border: none;
    }

    .btn-inserisci {
        background: #0071e3; /* blu Apple */
    }

    .btn-visualizza {
        background: #34c759; /* verde Apple */
    }

    .btn:hover {
        opacity: 0.85;
        transform: translateY(-2px);
        box-shadow: 0 6px 12px rgba(0,0,0,0.1);
    }

    /* Form search nella navbar */
    .form-inline .form-control {
        border-radius: 10px;
        border: 1px solid #d1d1d6;
    }
    .form-inline .btn-outline-success {
        color: #0071e3;
        border-color: #0071e3;
    }
    .form-inline .btn-outline-success:hover {
        background-color: #0071e3;
        color: #fff;
    }
</style>
</head>
<body>
	<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light">
  <a class="navbar-brand" href="home.html">Home</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" 
          aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse justify-content-center" id="navbarSupportedContent">
    <ul class="navbar-nav mr-auto">
      <li class="nav-item">
        <a class="nav-link" href="Avvio?scelta=2">Tabella</a>
      </li>
      <li class="nav-item dropdown">
        <a class="nav-link dropdown-toggle" href="Avvio?scelta=2" role="button" data-toggle="dropdown" aria-expanded="false">
          Operazioni
        </a>
        <div class="dropdown-menu">
          <a class="dropdown-item" href="formFK.html">Inserisci Marche/Categorie</a>
          <a class="dropdown-item" href="Avvio?scelta=0">Inserisci Prodotti</a>
          <div class="dropdown-divider"></div>
          <a class="dropdown-item" href="Avvio?scelta=2">Visualizza Tabella</a>
        </div>
      </li>
    </ul>
  </div>
</nav>
	
<div class="glass-container">
    <h1>Gestione dei Prodotti</h1>
    <a href="Avvio?scelta=0" class="btn btn-inserisci">Inserisci</a>
    <a href="Avvio?scelta=2" class="btn btn-visualizza">Visualizza</a>
</div>
    
</body>
</html>
